<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Danang Work</title>

  <!-- FONT + ICON -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <h3>DANANG WORK</h3>
      <p>Tìm việc thông minh tại Đà Nẵng</p>
    </div>
  </div>
</div>

<!-- LOGIN BOX -->
<div class="login-wrapper">
  <div class="login-card">

    <h2>Chào mừng trở lại</h2>
    <p>Đăng nhập để tiếp tục hành trình của bạn</p>

    <!-- EMAIL -->
    <div class="input-group">
      <i class="fa fa-envelope"></i>
      <input type="email" placeholder="Email">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" placeholder="Mật khẩu">
      <i class="fa fa-eye"></i>
    </div>

    <!-- OPTIONS -->
    <div class="options">
      <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
      <a href="#">Quên mật khẩu?</a>
    </div>

    <!-- BUTTON -->
    <button class="btn-login">Đăng nhập →</button>

    <p class="register">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </p>

    <!-- STATS -->
    <div class="stats">
      <span>✨ 1,200+ việc làm</span>
      <span>🛡 500+ công ty</span>
      <span>👤 10,000+ ứng viên</span>
    </div>

  </div>
</div>

<!-- Nút về trang chủ -->
<a href="index.html" class="home-btn">
  <i class="fa fa-home"></i>
</a>

<script src="login.js"></script>
</body>
</html>
